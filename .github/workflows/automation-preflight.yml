name: Automation preflight

on:
  push:
    paths:
      - "agents/**"
      - "inputs/**"
      - "operations/**"
      - "prompts/**"
      - "scripts/**"
      - ".github/workflows/**"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm install
      - name: Check script syntax
        run: |
          node --check scripts/cloud-agent.mjs
          node --check scripts/build-dashboard.mjs
          node --check scripts/check-approval.mjs
          node --check scripts/build-publish-queue.mjs
          node --check scripts/build-post-ready.mjs
          node --check scripts/preflight.mjs
      - name: Run preflight
        run: npm run cloud:preflight
      - name: Build dashboard
        run: npm run cloud:dashboard
