name: Comment reply assistant

on:
  workflow_dispatch:
    inputs:
      article:
        description: "対象記事URLまたは記事名"
        required: false
        type: string
      author:
        description: "コメント投稿者名"
        required: false
        type: string
      comment_text:
        description: "コメント本文"
        required: true
        type: string
      note:
        description: "補足メモ"
        required: false
        type: string

permissions:
  contents: write

jobs:
  reply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm install
      - name: Build reply draft
        run: npm run cloud:reply
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.2' }}
          COMMENT_ARTICLE: ${{ inputs.article }}
          COMMENT_AUTHOR: ${{ inputs.author }}
          COMMENT_TEXT: ${{ inputs.comment_text }}
          COMMENT_NOTE: ${{ inputs.note }}
      - name: Build dashboard
        run: npm run cloud:dashboard
      - name: Commit reply draft
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/replies/*.md outputs/dashboard.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: add comment reply draft"
            git push
          fi
