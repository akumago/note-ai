name: Build note post-ready package

on:
  workflow_dispatch:
    inputs:
      draft_path:
        description: "投稿パッケージ化するドラフトのパス。空なら最新候補を使用"
        required: false
        type: string

permissions:
  contents: write

jobs:
  post-ready:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm install
      - name: Build publish queue
        run: npm run cloud:publish-queue
      - name: Build post-ready package
        run: npm run cloud:post-ready
        env:
          POST_READY_DRAFT: ${{ inputs.draft_path }}
      - name: Build dashboard
        run: npm run cloud:dashboard
      - name: Commit post-ready package
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/publish-queue/*.md outputs/post-ready/*.md outputs/dashboard.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: add note post-ready package"
            git push
          fi
