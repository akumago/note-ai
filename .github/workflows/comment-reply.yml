name: Comment reply reminder

on:
  workflow_dispatch:
    inputs:
      article:
        description: "対象記事URLまたは記事名"
        required: false
        type: string
      author:
        description: "コメント投稿者名"
        required: false
        type: string
      comment_text:
        description: "コメント本文"
        required: true
        type: string
      note:
        description: "補足メモ"
        required: false
        type: string

permissions:
  contents: write

jobs:
  reminder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm install
      - name: Create comment reply reminder
        run: |
          mkdir -p outputs/reminders
          cat > outputs/reminders/$(date -u +%F)-comment-reply-reminder.md <<'EOF'
          # コメント返信案作成リマインド

          ## Codexで実行すること

          `prompts/comment-reply.md` に沿って、以下のコメントへの返信案を作成する。

          ## 対象記事

          ${{ inputs.article }}

          ## 投稿者

          ${{ inputs.author }}

          ## コメント本文

          ${{ inputs.comment_text }}

          ## 補足

          ${{ inputs.note }}

          ## 注意

          - GitHub ActionsではAI生成しない
          - Codex Business内で返信案を作る
          - note上の返信は社長が手動で行う
          EOF
      - name: Build dashboard
        run: npm run cloud:dashboard
      - name: Commit reminder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/reminders outputs/dashboard.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: add comment reply reminder"
            git push
          fi
