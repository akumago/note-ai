<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1500" viewBox="0 0 1200 1500" role="img" aria-labelledby="title desc">
  <title id="title">有料でも買う読者の条件</title>
  <desc id="desc">有料でも買う読者を見分けるための6項目チェックリスト。</desc>
  <rect width="1200" height="1500" fill="#f7f6f2"/>
  <rect x="80" y="80" width="1040" height="1340" rx="36" fill="#ffffff"/>
  <text x="140" y="180" font-family="'Yu Gothic', 'Meiryo', sans-serif" font-size="56" font-weight="700" fill="#1f2933">有料でも買う読者の条件</text>
  <text x="140" y="240" font-family="'Yu Gothic', 'Meiryo', sans-serif" font-size="30" fill="#5b6470">「興味がある人」ではなく、今すぐ解決したい人を見る。</text>

  <g font-family="'Yu Gothic', 'Meiryo', sans-serif" font-size="42" fill="#1f2933">
    <g transform="translate(140 350)">
      <rect x="0" y="0" width="920" height="130" rx="24" fill="#e7f0ef"/>
      <rect x="42" y="42" width="48" height="48" rx="10" fill="#2f6f73"/>
      <path d="M53 65 L65 78 L87 53" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="125" y="82" font-weight="700">悩みが強い</text>
    </g>
    <g transform="translate(140 510)">
      <rect x="0" y="0" width="920" height="130" rx="24" fill="#eef4fb"/>
      <rect x="42" y="42" width="48" height="48" rx="10" fill="#376996"/>
      <path d="M53 65 L65 78 L87 53" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="125" y="82" font-weight="700">早く解決したい</text>
    </g>
    <g transform="translate(140 670)">
      <rect x="0" y="0" width="920" height="130" rx="24" fill="#fff3df"/>
      <rect x="42" y="42" width="48" height="48" rx="10" fill="#c47f2c"/>
      <path d="M53 65 L65 78 L87 53" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="125" y="82" font-weight="700">調べる時間を減らしたい</text>
    </g>
    <g transform="translate(140 830)">
      <rect x="0" y="0" width="920" height="130" rx="24" fill="#f0edf8"/>
      <rect x="42" y="42" width="48" height="48" rx="10" fill="#6f5ba7"/>
      <path d="M53 65 L65 78 L87 53" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="125" y="82" font-weight="700">失敗を避けたい</text>
    </g>
    <g transform="translate(140 990)">
      <rect x="0" y="0" width="920" height="130" rx="24" fill="#edf7ec"/>
      <rect x="42" y="42" width="48" height="48" rx="10" fill="#4d8b57"/>
      <path d="M53 65 L65 78 L87 53" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="125" y="82" font-weight="700">テンプレに価値を感じる</text>
    </g>
    <g transform="translate(140 1150)">
      <rect x="0" y="0" width="920" height="130" rx="24" fill="#f8eeee"/>
      <rect x="42" y="42" width="48" height="48" rx="10" fill="#b75d5d"/>
      <path d="M53 65 L65 78 L87 53" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="125" y="82" font-weight="700">今すぐ行動したい</text>
    </g>
  </g>

  <text x="600" y="1360" text-anchor="middle" font-family="'Yu Gothic', 'Meiryo', sans-serif" font-size="26" fill="#5b6470">この条件が多いほど、有料化につながる悩みです。</text>
</svg>
