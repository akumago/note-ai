name: Daily Codex draft reminder

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reminder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm install
      - name: Check approved topic
        run: npm run cloud:check-approval
        env:
          ALLOW_OLD_APPROVAL: ${{ vars.ALLOW_OLD_APPROVAL || 'false' }}
      - name: Create Codex draft reminder
        run: node scripts/build-codex-reminder.mjs draft
      - name: Build publish queue
        run: npm run cloud:publish-queue
      - name: Build post-ready package
        run: npm run cloud:post-ready
        continue-on-error: true
      - name: Build dashboard
        run: npm run cloud:dashboard
      - name: Commit reminder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p outputs/publish-queue outputs/post-ready
          git add outputs/reminders outputs/publish-queue outputs/post-ready outputs/dashboard.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: add Codex draft reminder"
            git push
          fi
