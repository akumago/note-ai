name: Weekly note editorial meeting

on:
  schedule:
    - cron: "0 11 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm install
      - name: Run weekly editorial meeting
        run: npm run cloud:weekly
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.2' }}
      - name: Build dashboard
        run: npm run cloud:dashboard
      - name: Commit outputs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: add weekly note editorial meeting"
          file_pattern: outputs/metrics/*.md outputs/dashboard.md
