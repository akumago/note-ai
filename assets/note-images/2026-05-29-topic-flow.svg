<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">noteネタ選定フロー</title>
  <desc id="desc">ランキングを見る、伸びているテーマを拾う、有料でも買う人の悩みに絞る、一次情報を入れられるか確認、シリーズ化・撤退判断の5ステップ。</desc>
  <rect width="1600" height="900" fill="#f7f6f2"/>
  <rect x="80" y="80" width="1440" height="740" rx="32" fill="#ffffff"/>
  <text x="120" y="155" font-family="'Yu Gothic', 'Meiryo', sans-serif" font-size="48" font-weight="700" fill="#1f2933">noteネタ選定フロー</text>
  <text x="120" y="205" font-family="'Yu Gothic', 'Meiryo', sans-serif" font-size="26" fill="#5b6470">ランキングは真似する場所ではなく、需要を確認する場所。</text>

  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#2f6f73"/>
    </marker>
  </defs>

  <g font-family="'Yu Gothic', 'Meiryo', sans-serif">
    <rect x="120" y="330" width="230" height="220" rx="20" fill="#e7f0ef" stroke="#2f6f73" stroke-width="3"/>
    <text x="235" y="390" text-anchor="middle" font-size="28" font-weight="700" fill="#1f2933">1</text>
    <text x="235" y="440" text-anchor="middle" font-size="28" font-weight="700" fill="#1f2933">ランキングを</text>
    <text x="235" y="480" text-anchor="middle" font-size="28" font-weight="700" fill="#1f2933">見る</text>

    <line x1="370" y1="440" x2="470" y2="440" stroke="#2f6f73" stroke-width="5" marker-end="url(#arrow)"/>

    <rect x="490" y="330" width="230" height="220" rx="20" fill="#eef4fb" stroke="#376996" stroke-width="3"/>
    <text x="605" y="390" text-anchor="middle" font-size="28" font-weight="700" fill="#1f2933">2</text>
    <text x="605" y="440" text-anchor="middle" font-size="28" font-weight="700" fill="#1f2933">伸びている</text>
    <text x="605" y="480" text-anchor="middle" font-size="28" font-weight="700" fill="#1f2933">テーマを拾う</text>

    <line x1="740" y1="440" x2="840" y2="440" stroke="#2f6f73" stroke-width="5" marker-end="url(#arrow)"/>

    <rect x="860" y="300" width="250" height="280" rx="20" fill="#fff3df" stroke="#c47f2c" stroke-width="3"/>
    <text x="985" y="365" text-anchor="middle" font-size="28" font-weight="700" fill="#1f2933">3</text>
    <text x="985" y="415" text-anchor="middle" font-size="27" font-weight="700" fill="#1f2933">有料でも買う</text>
    <text x="985" y="455" text-anchor="middle" font-size="27" font-weight="700" fill="#1f2933">人の悩みに</text>
    <text x="985" y="495" text-anchor="middle" font-size="27" font-weight="700" fill="#1f2933">絞る</text>

    <line x1="1130" y1="440" x2="1230" y2="440" stroke="#2f6f73" stroke-width="5" marker-end="url(#arrow)"/>

    <rect x="1250" y="300" width="250" height="280" rx="20" fill="#f0edf8" stroke="#6f5ba7" stroke-width="3"/>
    <text x="1375" y="365" text-anchor="middle" font-size="28" font-weight="700" fill="#1f2933">4</text>
    <text x="1375" y="415" text-anchor="middle" font-size="27" font-weight="700" fill="#1f2933">一次情報を</text>
    <text x="1375" y="455" text-anchor="middle" font-size="27" font-weight="700" fill="#1f2933">入れられるか</text>
    <text x="1375" y="495" text-anchor="middle" font-size="27" font-weight="700" fill="#1f2933">確認</text>

    <path d="M1375 590 C1375 690, 985 690, 985 610" fill="none" stroke="#2f6f73" stroke-width="5" marker-end="url(#arrow)"/>

    <rect x="760" y="625" width="450" height="110" rx="20" fill="#1f2933"/>
    <text x="985" y="670" text-anchor="middle" font-size="28" font-weight="700" fill="#ffffff">5. シリーズ化・撤退判断</text>
    <text x="985" y="710" text-anchor="middle" font-size="22" fill="#d7dde4">伸びたら続ける。落ちたら撤退。</text>
  </g>
</svg>
