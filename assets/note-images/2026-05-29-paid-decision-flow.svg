<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">有料化判断フロー</title>
  <desc id="desc">5条件を数え、3つ以上なら有料化候補、2つ以下なら無料記事で反応を見る。</desc>
  <rect width="1600" height="900" fill="#f7f6f2"/>
  <rect x="90" y="80" width="1420" height="740" rx="36" fill="#ffffff"/>
  <text x="800" y="160" text-anchor="middle" font-family="'Yu Gothic','Meiryo',sans-serif" font-size="56" font-weight="700" fill="#1f2933">有料化判断フロー</text>
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#2f6f73"/>
    </marker>
  </defs>
  <g font-family="'Yu Gothic','Meiryo',sans-serif">
    <rect x="170" y="330" width="330" height="180" rx="28" fill="#e7f0ef" stroke="#2f6f73" stroke-width="4"/>
    <text x="335" y="405" text-anchor="middle" font-size="38" font-weight="700" fill="#1f2933">5条件を数える</text>
    <text x="335" y="455" text-anchor="middle" font-size="25" fill="#5b6470">読者の悩みの深さを見る</text>

    <line x1="520" y1="420" x2="650" y2="420" stroke="#2f6f73" stroke-width="6" marker-end="url(#arrow)"/>

    <rect x="680" y="250" width="330" height="180" rx="28" fill="#1f2933"/>
    <text x="845" y="325" text-anchor="middle" font-size="40" font-weight="700" fill="#ffffff">3つ以上</text>
    <text x="845" y="380" text-anchor="middle" font-size="30" fill="#d7dde4">有料化候補</text>

    <rect x="680" y="520" width="330" height="180" rx="28" fill="#eef4fb" stroke="#376996" stroke-width="4"/>
    <text x="845" y="595" text-anchor="middle" font-size="40" font-weight="700" fill="#1f2933">2つ以下</text>
    <text x="845" y="650" text-anchor="middle" font-size="30" fill="#5b6470">無料記事で反応を見る</text>

    <line x1="1025" y1="340" x2="1145" y2="340" stroke="#2f6f73" stroke-width="6" marker-end="url(#arrow)"/>
    <line x1="1025" y1="610" x2="1145" y2="610" stroke="#376996" stroke-width="6" marker-end="url(#arrow)"/>

    <rect x="1170" y="250" width="300" height="180" rx="28" fill="#fff3df" stroke="#c47f2c" stroke-width="4"/>
    <text x="1320" y="325" text-anchor="middle" font-size="34" font-weight="700" fill="#1f2933">テンプレート化</text>
    <text x="1320" y="375" text-anchor="middle" font-size="25" fill="#5b6470">手順・実例・チェック表</text>

    <rect x="1170" y="520" width="300" height="180" rx="28" fill="#f0edf8" stroke="#6f5ba7" stroke-width="4"/>
    <text x="1320" y="595" text-anchor="middle" font-size="34" font-weight="700" fill="#1f2933">信頼作り</text>
    <text x="1320" y="645" text-anchor="middle" font-size="25" fill="#5b6470">無料記事で検証</text>
  </g>
</svg>
